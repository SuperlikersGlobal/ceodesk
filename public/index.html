<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f1120" />
<title>CeoDesk</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root {
    --ground:#f4f5fb; --surface:#fff; --surface-2:#f7f8fc; --ink:#1a1d2b; --muted:#626a80; --faint:#9298ad;
    --border:#e6e8f2; --border-strong:#d4d8e6; --brand:#4f46e5; --brand-ink:#4338ca; --brand-soft:#eceafe;
    --green:#15803d; --green-soft:#e6f5ec; --amber:#b45309; --amber-soft:#fbf0dd; --red:#b91c1c; --red-soft:#fbe9e9;
    --blue:#1d4ed8; --blue-soft:#e7eefd; --slate:#475569; --slate-soft:#eef0f5;
    --radius:13px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,24,50,.04),0 6px 22px rgba(20,24,50,.07);
    --shadow-lg:0 18px 60px rgba(20,24,50,.18);
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sidebar-w:224px;
  }
  @media (prefers-color-scheme: dark){:root{
    --ground:#0e1020; --surface:#181b2c; --surface-2:#1f2236; --ink:#e8eaf5; --muted:#a2a8c0; --faint:#767d98;
    --border:#2a2e46; --border-strong:#3a3f5c; --brand:#8983f6; --brand-ink:#a9a4fb; --brand-soft:#26264a;
    --green:#4ade80; --green-soft:#173026; --amber:#fbbf24; --amber-soft:#33280f; --red:#f87171; --red-soft:#331a1c;
    --blue:#7ea6ff; --blue-soft:#182541; --slate:#94a3b8; --slate-soft:#232838;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35); --shadow-lg:0 18px 60px rgba(0,0,0,.55);
  }}
  :root[data-theme="light"]{
    --ground:#f4f5fb; --surface:#fff; --surface-2:#f7f8fc; --ink:#1a1d2b; --muted:#626a80; --faint:#9298ad;
    --border:#e6e8f2; --border-strong:#d4d8e6; --brand:#4f46e5; --brand-ink:#4338ca; --brand-soft:#eceafe;
    --green:#15803d; --green-soft:#e6f5ec; --amber:#b45309; --amber-soft:#fbf0dd; --red:#b91c1c; --red-soft:#fbe9e9;
    --blue:#1d4ed8; --blue-soft:#e7eefd; --slate:#475569; --slate-soft:#eef0f5;
    --shadow:0 1px 2px rgba(20,24,50,.04),0 6px 22px rgba(20,24,50,.07);
  }
  :root[data-theme="dark"]{
    --ground:#0e1020; --surface:#181b2c; --surface-2:#1f2236; --ink:#e8eaf5; --muted:#a2a8c0; --faint:#767d98;
    --border:#2a2e46; --border-strong:#3a3f5c; --brand:#8983f6; --brand-ink:#a9a4fb; --brand-soft:#26264a;
    --green:#4ade80; --green-soft:#173026; --amber:#fbbf24; --amber-soft:#33280f; --red:#f87171; --red-soft:#331a1c;
    --blue:#7ea6ff; --blue-soft:#182541; --slate:#94a3b8; --slate-soft:#232838;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body,#root{height:100%;margin:0}
  body{background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} button{font-family:inherit;cursor:pointer}
  .tnum{font-variant-numeric:tabular-nums}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* Login */
  .login{min-height:100%;display:grid;place-items:center;background:radial-gradient(120% 90% at 50% -10%,var(--brand-soft),transparent 60%),var(--ground)}
  .loginbox{width:360px;max-width:88vw;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:34px 28px}
  .loginbox .lg{width:54px;height:54px;border-radius:15px;background:var(--brand);display:grid;place-items:center;color:#fff;font-weight:800;font-size:25px;margin:0 auto 16px}
  .loginbox h1{font-size:21px;margin:0} .loginbox .sub{color:var(--muted);font-size:13.5px;margin:7px 0 22px}
  #gbtn{display:flex;justify-content:center;min-height:44px}
  .login-msg{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}
  .login-foot{margin-top:16px;font-size:12px;color:var(--faint)}

  /* Shell */
  .app{display:flex;min-height:100%}
  .side{width:var(--sidebar-w);flex-shrink:0;background:#0f1120;color:#c7cbe0;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:20;padding:14px 10px}
  .side__brand{display:flex;align-items:center;gap:10px;color:#fff;font-weight:750;padding:6px 8px 14px;font-size:16px}
  .side__logo{width:29px;height:29px;border-radius:8px;background:var(--brand);display:grid;place-items:center;color:#fff;font-weight:800}
  .nav{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;color:#b7bcd4;font-weight:600;font-size:13.5px;transition:background .12s,color .12s}
  .nav:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav.on{background:var(--brand);color:#fff}
  .nav .ic{width:17px;text-align:center}
  .nav .count{margin-left:auto;background:rgba(255,255,255,.16);border-radius:999px;padding:1px 8px;font-size:12px;font-weight:800}
  .side__foot{margin-top:auto;font-size:11.5px;color:#8b90ab;padding:10px 8px 2px;border-top:1px solid rgba(255,255,255,.08)}
  .side__foot b{color:#c7cbe0;font-weight:650}

  .main{flex:1;margin-left:var(--sidebar-w);min-width:0;display:flex;flex-direction:column}
  .top{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 22px;position:sticky;top:0;z-index:10}
  .top__title{font-weight:700;font-size:15px} .top__spacer{flex:1}
  .content{padding:24px;max-width:1120px;width:100%;margin:0 auto}

  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
  .who{display:flex;align-items:center;gap:9px}
  .who__meta{line-height:1.15} .who__name{font-size:13px;font-weight:700} .who__role{font-size:11.5px;color:var(--muted)}
  .iconbtn{border:1px solid var(--border-strong);background:var(--surface);color:var(--muted);border-radius:8px;padding:7px 11px;font-weight:650;font-size:12.5px}
  .iconbtn:hover{background:var(--surface-2)}

  .phead{margin-bottom:20px} .phead h1{font-size:22px;margin:0} .phead p{margin:4px 0 0;color:var(--muted);max-width:62ch}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
  .stat__label{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
  .stat__value{font-size:28px;font-weight:800;margin-top:6px}
  .stat__value.danger{color:var(--red)} .stat__value.warn{color:var(--amber)}

  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .chip{border:1px solid var(--border-strong);background:var(--surface);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--muted)}
  .chip.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}

  .rows{display:flex;flex-direction:column;gap:10px}
  .rowlbl{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:700;margin:2px 0 10px}
  .row{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;text-align:left;transition:border-color .12s,box-shadow .12s}
  .row:hover{border-color:var(--brand);box-shadow:var(--shadow)}
  .row .prio{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
  .row .rmain{min-width:0;flex:1}
  .row .rtitle{font-weight:650;font-size:14.5px;display:flex;gap:8px;align-items:center}
  .rcode{color:var(--faint);font-weight:700;font-size:12.5px}
  .row .rmeta{color:var(--muted);font-size:12.5px;margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .row .rside{display:flex;align-items:center;gap:9px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

  .gt-add{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px}
  .gt-add input{flex:1;min-width:180px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);border-radius:9px;padding:9px 12px;font-size:13.5px}
  .gt-add select{border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);border-radius:9px;padding:9px 10px;font-size:12.5px;font-weight:600}
  .gt-card{display:flex;align-items:flex-start;gap:13px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
  .gt-card.done{opacity:.62}
  .gt-card .gt-main{min-width:0;flex:1}
  .gt-card .gt-title{font-weight:650;font-size:14.5px}
  .gt-card.done .gt-title{text-decoration:line-through}
  .gt-card .gt-desc{color:var(--muted);font-size:13px;margin-top:3px;white-space:pre-wrap;overflow-wrap:anywhere}
  .gt-card .gt-meta{margin-top:7px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .gt-card .gt-act{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .gt-card .gt-act .btn{padding:7px 12px;font-size:12.5px}
  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap}
  .badge.bdot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex:0 0 auto}
  .b-green{background:var(--green-soft);color:var(--green)} .b-red{background:var(--red-soft);color:var(--red)}
  .b-amber{background:var(--amber-soft);color:var(--amber)} .b-blue{background:var(--blue-soft);color:var(--blue)}
  .b-slate{background:var(--slate-soft);color:var(--slate)} .b-brand{background:var(--brand-soft);color:var(--brand-ink)}
  .due{font-size:12.5px;font-weight:650} .due.overdue{color:var(--red)} .due.soon{color:var(--amber)} .due.ok{color:var(--muted)} .due.none{color:var(--faint)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .split{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
  .field{margin-bottom:15px} .field label{display:block;font-weight:650;font-size:13.5px;margin-bottom:5px}
  .field .hint{font-weight:400;color:var(--muted);font-size:12.5px;margin:-1px 0 6px}
  .inp,.ta,.sel{width:100%;border:1px solid var(--border-strong);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit;background:var(--surface);color:var(--ink)}
  .ta{min-height:78px;resize:vertical} .inp:focus,.ta:focus,.sel:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .typegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px}
  .topt{border:1.5px solid var(--border-strong);border-radius:10px;padding:12px 6px;text-align:center;font-weight:650;font-size:12.5px;color:var(--muted);background:var(--surface)}
  .topt.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-ink)}
  .topt .ti{display:block;font-size:20px;margin-bottom:3px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);border-radius:9px;padding:10px 16px;font-size:13.5px;font-weight:650;transition:background .12s,opacity .12s}
  .btn:hover{background:var(--surface-2)} .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn--primary{background:var(--brand);border-color:var(--brand);color:#fff} .btn--primary:hover{filter:brightness(1.05);background:var(--brand)}
  .btn--green{background:var(--green);border-color:var(--green);color:#fff} .btn--red{background:var(--surface);border-color:var(--border-strong);color:var(--red)} .btn--red:hover{background:var(--red-soft)}

  .dblock{margin-bottom:16px} .dblock h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin:0 0 5px} .dblock p{margin:0;white-space:pre-wrap}
  .docpill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface-2);border-radius:9px;padding:9px 12px;font-weight:600;font-size:13px}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px}
  .kv:last-child{border-bottom:0} .kv .k{color:var(--muted)} .kv .v{font-weight:650;text-align:right}
  .callout{background:var(--amber-soft);border:1px solid color-mix(in srgb,var(--amber) 32%,transparent);border-radius:12px;padding:14px}
  .callout h4{font-size:13px;color:var(--amber);margin:0 0 8px}
  .decision{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:18px}

  .tl{position:relative;padding-left:20px} .tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
  .tli{position:relative;padding-bottom:14px} .tli::before{content:"";position:absolute;left:-20px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2px solid var(--border-strong)}
  .tli.g::before{border-color:var(--green)} .tli.r::before{border-color:var(--red)} .tli.a::before{border-color:var(--amber)} .tli.br::before{border-color:var(--brand)}
  .tli .th{font-size:13.5px} .tli .tt{font-size:11.5px;color:var(--faint);margin-top:1px} .tli .tn{margin-top:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.8px;white-space:pre-wrap}

  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:650;font-size:13.5px;margin-bottom:14px;background:none;border:0}
  .actionbar{display:flex;flex-wrap:wrap;gap:8px}
  .empty{text-align:center;padding:52px 20px;color:var(--muted)} .empty .ic{font-size:34px;margin-bottom:8px}
  .link{color:var(--brand);font-weight:650}
  .banner{display:flex;gap:9px;background:var(--brand-soft);border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);color:var(--brand-ink);border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:18px}

  .overlay{position:fixed;inset:0;background:rgba(15,17,32,.5);display:grid;place-items:center;z-index:50;padding:20px}
  .modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:440px;max-width:92vw;padding:22px}
  .modal h2{margin:0 0 6px;font-size:17px} .modal .msub{color:var(--muted);margin:0 0 16px;font-size:13.5px}
  .modal__actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

  /* Kanban */
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start}
  .kcol{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px;transition:background .12s,border-color .12s}
  .kcol.over{background:var(--brand-soft);border-color:var(--brand)}
  .kcol__head{font-weight:700;font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin:2px 4px 10px;display:flex;align-items:center;gap:8px}
  .kcount{background:var(--slate-soft);color:var(--slate);border-radius:999px;padding:0 8px;font-size:12px;font-weight:800}
  .kcol__body{display:flex;flex-direction:column;gap:9px;min-height:44px}
  .kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;box-shadow:var(--shadow)}
  .kcard[draggable="true"]{cursor:grab}
  .kcard[draggable="true"]:active{cursor:grabbing}
  .kcard__title{font-weight:600;font-size:13.5px;line-height:1.35}
  .kcard__meta{color:var(--faint);font-size:12px;margin-top:4px}
  .kcard__foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px}
  .kempty{color:var(--faint);font-size:12.5px;text-align:center;padding:12px 0}
  @media (max-width:900px){.kanban{grid-template-columns:1fr 1fr}}
  @media (max-width:600px){.kanban{grid-template-columns:1fr}}
  /* Métricas */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .mcard h3{font-size:13px;margin:0 0 14px;font-weight:700}
  .mrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
  .mrow__label{width:160px;flex-shrink:0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrow__bar{flex:1;background:var(--surface-2);border-radius:6px;height:20px;overflow:hidden;border:1px solid var(--border)}
  .mrow__fill{height:100%;background:var(--brand);border-radius:6px;min-width:2px}
  .mrow__val{width:32px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  @media (max-width:820px){.mgrid{grid-template-columns:1fr}.mrow__label{width:120px}}
  /* Etiquetas */
  .lbls{display:inline-flex;gap:5px;flex-wrap:wrap;vertical-align:middle}
  .lbl{display:inline-flex;align-items:center;gap:4px;background:var(--slate-soft);color:var(--slate);border-radius:6px;padding:1px 7px;font-size:11.5px;font-weight:650;white-space:nowrap}
  .taginput{display:flex;flex-wrap:wrap;gap:6px;border:1px solid var(--border-strong);border-radius:9px;padding:7px 8px;background:var(--surface)}
  .taginput:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .taginput .lbl{background:var(--brand-soft);color:var(--brand-ink);font-size:12.5px;padding:3px 8px}
  .taginput .lbl b{cursor:pointer;font-weight:800;opacity:.6;margin-left:1px}
  .taginput input{border:0;outline:0;flex:1;min-width:120px;font-size:13.5px;background:transparent;color:var(--ink)}
  .menu-btn{display:none}
  @media (max-width:900px){.split{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.typegrid{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}}
  @media (max-width:720px){
    .side{transform:translateX(-100%);transition:transform .2s;width:230px} .side.open{transform:translateX(0)}
    .main{margin-left:0} .content{padding:16px} .menu-btn{display:inline-flex} .row .rside{flex-direction:column;align-items:flex-end;gap:5px}
  }
</style>
</head>
<body>
<div id="root"><div class="login"><div class="loginbox"><div class="lg">C</div><h1>CeoDesk</h1><p class="sub">Cargando…</p></div></div></div>

<script>
(function(){
  "use strict";
  var API = '/api';
  var TOKEN_KEY = 'ceodesk_token';
  var TYPE = { task:'Tarea', bug:'Incidencia', approve:'Aprobación', sign:'Firma', decide:'Decisión', read:'Lectura' };
  var TYPE_ICON = { task:'📋', bug:'🐞', approve:'✅', sign:'✍️', decide:'⚖️', read:'👁' };
  var DECISION_TYPES = ['approve','sign','decide'];
  var STATUS = { pending:'Pendiente', in_review:'En revisión', info_requested:'Info solicitada', approved:'Aprobada', rejected:'Rechazada', signed:'Firmada', read:'Leída', todo:'Por hacer', doing:'En curso', done:'Hecha', blocked:'Bloqueada', open:'Abierta', resolved:'Resuelta', closed:'Cerrada', cancelled:'Cancelada' };
  var STATUS_TONE = { pending:'amber', in_review:'blue', info_requested:'amber', approved:'green', rejected:'red', signed:'green', read:'green', todo:'slate', doing:'blue', done:'green', blocked:'red', open:'amber', resolved:'blue', closed:'green', cancelled:'slate' };
  var PRIO = { low:'Baja', medium:'Media', high:'Alta', urgent:'Urgente' };
  var PRIO_COLOR = { low:'var(--slate)', medium:'var(--blue)', high:'var(--amber)', urgent:'var(--red)' };
  var OPEN = ['pending','in_review','info_requested','todo','doing','blocked','open','resolved'];
  var EVENT = { created:'creó el ítem', commented:'comentó', info_requested:'pidió más información', info_provided:'respondió con más información', approved:'aprobó', rejected:'rechazó', signed:'firmó', read:'marcó como leída', started:'empezó', completed:'completó', blocked:'bloqueó', resumed:'reanudó', resolved:'resolvió', closed:'cerró', reopened:'reabrió', cancelled:'canceló' };
  var EVENT_ACCENT = { approved:'g', signed:'g', completed:'g', read:'g', closed:'g', resolved:'br', reopened:'a', rejected:'r', blocked:'r', info_requested:'a', created:'br' };
  var DAY = 86400000;

  var state = { config:null, token:null, user:null, requests:[], roster:[], loaded:false, listFilter:'all', histFilter:'all', boardScope:'', boardArea:'', boardKind:'task', boardLabel:'', gtasks:[], gtasksEnabled:false, gtBusy:false, gtasksMode:'', gtasksConnected:false, gtasksLists:[], jira:[], jiraEnabled:false, jiraConnected:false, jiraSite:'', jiraBusy:false, jiraFlash:null, fiscal:[], fiscalLoaded:false, fiscalBusy:false, fiscalCountry:'', fiscalStatus:'', fiscalEditId:null, fiscalView:'calendar', fiscalCalMonth:'' };
  var root = document.getElementById('root');

  // ---------- utils ----------
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function isOpen(s){ return OPEN.indexOf(s)>=0; }
  function initials(n){ return String(n||'').split(' ').filter(Boolean).slice(0,2).map(function(x){return x[0].toUpperCase();}).join(''); }
  function avatarColor(n){ var c=['#4f46e5','#0891b2','#db2777','#ea580c','#16a34a','#7c3aed']; var h=0; n=String(n||''); for(var i=0;i<n.length;i++) h=n.charCodeAt(i)+((h<<5)-h); return c[Math.abs(h)%c.length]; }
  function avatar(name,size){ size=size||30; return '<span class="avatar" style="background:'+avatarColor(name)+';width:'+size+'px;height:'+size+'px;font-size:'+(size*0.4)+'px" title="'+esc(name)+'">'+esc(initials(name))+'</span>'; }
  function fmtDate(iso){ if(!iso) return '—'; return new Date(iso).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}); }
  function fmtDateTime(iso){ if(!iso) return '—'; return new Date(iso).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
  function rel(iso){ if(!iso) return ''; var d=new Date(iso).getTime()-Date.now(); var a=Math.abs(d),f=d>0,v,u; if(a<3600000){v=Math.max(1,Math.round(a/60000));u='min';} else if(a<DAY){v=Math.round(a/3600000);u='h';} else {v=Math.round(a/DAY);u='d';} return f?('en '+v+' '+u):('hace '+v+' '+u); }
  function dueInfo(iso){ if(!iso) return {label:'Sin fecha límite',tone:'none'}; var d=new Date(iso).getTime()-Date.now(); if(d<0) return {label:'Vencida '+rel(iso),tone:'overdue'}; if(d<2*DAY) return {label:'Vence '+rel(iso),tone:'soon'}; return {label:'Vence '+rel(iso),tone:'ok'}; }
  function typeBadge(t){ return '<span class="badge b-brand">'+TYPE_ICON[t]+' '+TYPE[t]+'</span>'; }
  function statusBadge(s){ return '<span class="badge bdot b-'+STATUS_TONE[s]+'">'+STATUS[s]+'</span>'; }
  function prioBadge(p){ var tone=p==='urgent'?'red':p==='high'?'amber':p==='medium'?'blue':'slate'; return '<span class="badge b-'+tone+'">'+PRIO[p]+'</span>'; }
  function dueBadge(iso){ var d=dueInfo(iso); return '<span class="due '+d.tone+'">'+esc(d.label)+'</span>'; }
  function labelChips(r){ return (r.labels&&r.labels.length)?'<span class="lbls">'+r.labels.map(function(l){return '<span class="lbl">'+esc(l)+'</span>';}).join('')+'</span>':''; }
  function allLabels(){ var s={}; state.requests.forEach(function(r){ (r.labels||[]).forEach(function(l){ s[l]=1; }); }); return Object.keys(s).sort(function(a,b){return a.localeCompare(b,'es');}); }

  // ---------- api ----------
  function api(path, opts){
    opts = opts || {};
    var headers = { 'Content-Type':'application/json' };
    if(state.token) headers['Authorization'] = 'Bearer '+state.token;
    return fetch(API+path, { method:opts.method||'GET', headers:headers, body:opts.body?JSON.stringify(opts.body):undefined })
      .then(function(r){
        if(r.status===401){ logout(); throw new Error('Tu sesión expiró. Vuelve a entrar.'); }
        return r.json().catch(function(){return {};}).then(function(data){ if(!r.ok) throw new Error(data.error||('Error '+r.status)); return data; });
      });
  }

  // ---------- auth ----------
  function boot(){
    state.token = sessionStorage.getItem(TOKEN_KEY);
    // Vuelta del OAuth de Jira: ?jira=connected|error|nosite. Limpia la URL.
    try{ var qp=new URLSearchParams(location.search); state.jiraFlash=qp.get('jira');
      if(state.jiraFlash) history.replaceState(null,'',location.pathname+location.hash); }catch(e){}
    api('/config').then(function(cfg){
      state.config = cfg;
      if(state.token){ loadAndStart(); } else { showLogin(); }
    }).catch(function(){ showLogin('No se pudo cargar la configuración.'); });
  }
  function loadAndStart(){
    // deriva el usuario desde el token (payload firmado) antes de cargar
    state.user = decodeUser(state.token);
    Promise.all([loadRequests(), loadRoster(), loadGtasks(), loadJira(), loadFiscal()]).then(function(){
      state.loaded = true;
      if(!location.hash) location.hash = '#/bandeja';
      render();
      if(state.jiraFlash==='error'){ alert('No se pudo conectar Jira. Intenta de nuevo.'); }
      else if(state.jiraFlash==='nosite'){ alert('No encontramos un sitio de Jira para tu cuenta.'); }
      state.jiraFlash=null;
    }).catch(function(e){ showLogin(e.message); });
  }
  function decodeUser(token){
    try{
      var seg=token.split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
      var bin=atob(seg), bytes=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      var p=JSON.parse(new TextDecoder('utf-8').decode(bytes)); // UTF-8 para nombres con tildes
      return {email:p.u,name:p.name,role:p.role,title:p.title,sup:!!p.sup};
    } catch(e){ return {email:'',name:'Usuario',role:'leader',title:'',sup:false}; }
  }
  function loadRequests(){ return api('/requests').then(function(d){ state.requests = d.requests||[]; }); }
  function loadRoster(){ return api('/roster').then(function(d){ state.roster = d.people||[]; }).catch(function(){ state.roster=[]; }); }
  function loadFiscal(){ return api('/fiscal').then(function(d){ state.fiscal = d.obligations||[]; state.fiscalLoaded=true; }).catch(function(){ state.fiscal=[]; state.fiscalLoaded=true; }); }
  // Google Tasks: el CEO ve el hub (6 listas); los líderes, sus propias listas (opt-in).
  function loadGtasks(){
    if(!state.user || !(state.user.role==='ceo' || state.user.sup)){ state.gtasks=[]; state.gtasksEnabled=false; state.gtasksConnected=false; return Promise.resolve(); }
    return api('/google-tasks').then(function(d){
      state.gtasksEnabled=!!d.enabled; state.gtasksConnected=!!d.connected;
      state.gtasksMode=d.mode||''; state.gtasksLists=d.lists||[]; state.gtasks=d.tasks||[];
    }).catch(function(){ state.gtasks=[]; state.gtasksEnabled=false; state.gtasksConnected=false; });
  }
  // Jira (espejo vivo): cada usuario ve sus issues asignados (opt-in por persona).
  function loadJira(){
    if(!state.user){ state.jiraEnabled=false; state.jiraConnected=false; state.jira=[]; return Promise.resolve(); }
    return api('/jira').then(function(d){
      state.jiraEnabled=!!d.enabled; state.jiraConnected=!!d.connected; state.jira=d.issues||[]; state.jiraSite=d.site||'';
    }).catch(function(){ state.jiraEnabled=false; state.jiraConnected=false; state.jira=[]; });
  }

  function showLogin(msg){
    root.innerHTML =
      '<div class="login"><div class="loginbox">'+
        '<div class="lg">C</div><h1>CeoDesk</h1>'+
        '<p class="sub">Inicia sesión con tu cuenta <b>@'+esc((state.config&&state.config.allowedDomain)||'iwin.im')+'</b></p>'+
        '<div id="gbtn"></div>'+
        '<div class="login-msg">'+esc(msg||'')+'</div>'+
        '<div class="login-foot">Solo cuentas autorizadas del equipo.</div>'+
      '</div></div>';
    if(!state.config || !state.config.googleClientId){
      document.querySelector('.login-msg').textContent = 'El login con Google aún no está configurado (falta GOOGLE_CLIENT_ID).';
      return;
    }
    loadGsi().then(function(){
      try{
        google.accounts.id.initialize({ client_id: state.config.googleClientId, callback: onGoogle });
        google.accounts.id.renderButton(document.getElementById('gbtn'), { type:'standard', theme:'filled_blue', size:'large', shape:'pill', text:'signin_with', width:280 });
      }catch(e){ document.querySelector('.login-msg').textContent='No se pudo cargar Google Sign-In.'; }
    });
  }
  function loadGsi(){
    return new Promise(function(resolve){
      if(window.google && google.accounts && google.accounts.id) return resolve();
      var s=document.getElementById('gsi'); if(!s){ s=document.createElement('script'); s.id='gsi'; s.src='https://accounts.google.com/gsi/client'; s.async=true; document.head.appendChild(s); }
      s.addEventListener('load',function(){resolve();});
      var t=setInterval(function(){ if(window.google&&google.accounts&&google.accounts.id){clearInterval(t);resolve();} },150);
    });
  }
  function onGoogle(resp){
    var m=document.querySelector('.login-msg'); if(m) m.textContent='Verificando…';
    api('/google-login',{ method:'POST', body:{ credential: resp.credential } }).then(function(out){
      state.token=out.token; state.user=out.user; sessionStorage.setItem(TOKEN_KEY,out.token);
      loadAndStart();
    }).catch(function(e){ if(m) m.textContent=e.message; });
  }
  function logout(){ sessionStorage.removeItem(TOKEN_KEY); state.token=null; state.user=null; state.loaded=false; location.hash=''; showLogin(); }

  // ---------- shell + router ----------
  function render(){
    if(!state.user){ showLogin(); return; }
    var me = state.user.email;
    var inboxOpen = state.requests.filter(function(r){return r.assigneeId===me && isOpen(r.status);}).length;
    var myOpen = state.requests.filter(function(r){return r.requesterId===me && isOpen(r.status);}).length;
    var route = location.hash || '#/bandeja';

    var nav = '';
    nav += navItem('#/bandeja','📥','Mi trabajo', inboxOpen, route);
    nav += navItem('#/tablero','📊','Tablero', 0, route);
    if(state.user.sup){
      var supOpen = state.requests.filter(function(r){return r.requesterId!==me && r.assigneeId!==me && isOpen(r.status);}).length;
      nav += navItem('#/supervision','👁','Supervisión', supOpen, route);
    }
    nav += navItem('#/nueva','➕','Nueva solicitud', 0, route);
    nav += navItem('#/mis','📤','Mis solicitudes', myOpen, route);
    if(state.user.sup) nav += navItem('#/metricas','📈','Métricas', 0, route);
    nav += navItem('#/historial','🗂️','Historial', 0, route);
    nav += navItem('#/fiscal','📅','Cumplimiento Fiscal', 0, route);

    var view = renderRoute(route);

    root.innerHTML =
      '<div class="app">'+
        '<aside class="side" id="side">'+
          '<div class="side__brand"><span class="side__logo">C</span> CeoDesk</div>'+
          '<nav onclick="CeoDesk.closeMenu()">'+nav+'</nav>'+
          '<div class="side__foot"><b>'+esc(state.user.name)+'</b><br>'+esc(state.user.role==='ceo'?'CEO':(state.user.title||'Líder'))+'</div>'+
        '</aside>'+
        '<div class="main">'+
          '<header class="top">'+
            '<button class="iconbtn menu-btn" onclick="CeoDesk.toggleMenu()">☰</button>'+
            '<div class="top__title">'+esc(view.title)+'</div><div class="top__spacer"></div>'+
            '<div class="who">'+avatar(state.user.name)+'<div class="who__meta"><div class="who__name">'+esc(state.user.name)+'</div><div class="who__role">'+esc(state.user.role==='ceo'?'CEO':(state.user.title||'Líder'))+'</div></div></div>'+
            '<button class="iconbtn" onclick="CeoDesk.logout()" title="Cerrar sesión" style="margin-left:6px">Salir</button>'+
          '</header>'+
          '<main class="content">'+view.html+'</main>'+
        '</div>'+
      '</div>';
    if(view.after) view.after();
  }
  function navItem(href,ic,label,count,route){
    var on = route===href || (href==='#/bandeja'&&route==='#/') ? ' on':'';
    return '<a class="nav'+on+'" href="'+href+'"><span class="ic">'+ic+'</span> '+label+(count>0?'<span class="count">'+count+'</span>':'')+'</a>';
  }
  function renderRoute(route){
    if(route.indexOf('#/solicitud/')===0) return viewDetail(route.slice('#/solicitud/'.length));
    if(route==='#/nueva') return viewNew();
    if(route==='#/mis') return viewMine();
    if(route==='#/supervision') return viewSupervision();
    if(route==='#/tablero') return viewBoard();
    if(route==='#/metricas') return viewMetrics();
    if(route==='#/historial') return viewHistory();
    if(route==='#/fiscal') return viewFiscal();
    return viewInbox(); // #/bandeja para todos
  }

  // ---------- views ----------
  function requestRow(r){
    return '<a class="row" href="#/solicitud/'+encodeURIComponent(r.id)+'">'+
      '<span class="prio" style="background:'+PRIO_COLOR[r.priority]+'"></span>'+
      avatar(r.requesterName)+
      '<span class="rmain"><span class="rtitle"><span class="rcode">'+esc(r.code)+'</span> '+esc(r.title)+'</span>'+
        '<span class="rmeta"><span>'+esc(r.requesterName)+'</span><span>→</span><span>'+esc(r.assigneeName||'')+'</span><span>·</span><span>'+esc(rel(r.createdAt))+'</span>'+
        (r.documentName?'<span>·</span><span>📎 '+esc(r.documentName)+'</span>':'')+
        (r.labels&&r.labels.length?'<span>·</span>'+labelChips(r):'')+'</span></span>'+
      '<span class="rside">'+typeBadge(r.type)+statusBadge(r.status)+dueBadge(r.dueDate)+'</span></a>';
  }
  function prioRank(p){ return {urgent:0,high:1,medium:2,low:3}[p]; }

  // ---- Google Tasks (hub compartido con LADCC) ----
  var GT_STATUS = { todo:['Por hacer','b-slate'], doing:['En curso','b-blue'], blocked:['Bloqueada','b-amber'], done:['Hecha','b-green'] };
  var GT_META_LBL = { cat:'Categoría', imp:'Importancia', urg:'Urgencia' };
  function gtCard(t){
    var st = GT_STATUS[t.status] || GT_STATUS.todo;
    var meta='';
    meta += '<span class="badge b-brand">'+esc(t.listName)+'</span>';
    if(t.meta){ ['cat','imp','urg'].forEach(function(k){ if(t.meta[k]) meta+='<span class="chip" style="padding:3px 10px;font-size:11.5px">'+esc(GT_META_LBL[k])+': '+esc(t.meta[k])+'</span>'; }); }
    if(t.fingerprint) meta += '<span class="chip" style="padding:3px 10px;font-size:11.5px" title="Sincronizada con LADCC">🔗 '+esc(t.fingerprint)+'</span>';
    var due = t.due?'<span class="due '+dueInfo(t.due).tone+'">'+esc(dueInfo(t.due).label)+'</span>':'';
    var acts='';
    if(t.status!=='done'){
      if(t.status==='todo') acts+='<button class="btn" onclick="CeoDesk.gtAct(\'start\',\''+t.gid+'\',\''+t.listId+'\')">Empezar</button>';
      if(t.status==='doing') acts+='<button class="btn" onclick="CeoDesk.gtAct(\'block\',\''+t.gid+'\',\''+t.listId+'\')">Bloquear</button>';
      if(t.status==='blocked') acts+='<button class="btn" onclick="CeoDesk.gtAct(\'resume\',\''+t.gid+'\',\''+t.listId+'\')">Reanudar</button>';
      acts+='<button class="btn btn--primary" onclick="CeoDesk.gtAct(\'complete\',\''+t.gid+'\',\''+t.listId+'\')">Completar</button>';
    }
    return '<div class="gt-card'+(t.status==='done'?' done':'')+'">'+
      '<div class="gt-main"><div class="gt-title">'+esc(t.title)+'</div>'+
        (t.description?'<div class="gt-desc">'+esc(t.description)+'</div>':'')+
        '<div class="gt-meta"><span class="badge '+st[1]+' bdot">'+st[0]+'</span>'+meta+(due?due:'')+'</div></div>'+
      '<div class="gt-act">'+acts+'</div></div>';
  }
  function gtSection(){
    var isCeoUser = state.user.role==='ceo';

    var sub = isCeoUser ? '— tu sistema personal (6 listas), sincronizado con LADCC' : '— tus tareas de Google Tasks';

        '<div class="gt-add" style="justify-content:space-between">'+

      var urgOpts = '<option value="">Urgencia…</option>'+['Hoy','Pronto','Esta semana','Sin prisa'].map(function(v){return '<option>'+v+'</option>';}).join('');
      metaSel = '<select id="gt-imp">'+impOpts+'</select><select id="gt-urg">'+urgOpts+'</select>';

  function viewInbox(){
    var me = state.user.email;
    var open = state.requests.filter(function(r){return r.assigneeId===me && isOpen(r.status);}).sort(function(a,b){
      if(a.dueDate&&b.dueDate&&a.dueDate!==b.dueDate) return a.dueDate<b.dueDate?-1:1;
      if(a.dueDate&&!b.dueDate) return -1; if(!a.dueDate&&b.dueDate) return 1;
      return prioRank(a.priority)-prioRank(b.priority);
    });
    var overdue=open.filter(function(r){return r.dueDate&&new Date(r.dueDate)<Date.now();}).length;
    var urgent=open.filter(function(r){return r.priority==='urgent';}).length;
    var needInfo=open.filter(function(r){return r.status==='info_requested';}).length;
    var f=state.listFilter;
    var filtered = f==='all'?open:open.filter(function(r){return r.type===f;});
    var chips = '<button class="chip'+(f==='all'?' on':'')+'" onclick="CeoDesk.setFilter(\'all\')">Todas</button>';
    Object.keys(TYPE).forEach(function(t){ chips+='<button class="chip'+(f===t?' on':'')+'" onclick="CeoDesk.setFilter(\''+t+'\')">'+TYPE[t]+'</button>'; });
    var list = filtered.length ? '<div class="rows">'+filtered.map(requestRow).join('')+'</div>'
      : '<div class="empty"><div class="ic">🎉</div><p>No hay nada pendiente. Bandeja al día.</p></div>';
    return { title:'Mi trabajo', html:

  function countBy(arr, fn){ var m={}; arr.forEach(function(x){ var k=fn(x)||'—'; m[k]=(m[k]||0)+1; }); return Object.keys(m).map(function(k){return [k,m[k]];}).sort(function(a,b){return b[1]-a[1];}); }
  function barList(pairs){ if(!pairs.length) return '<p style="color:var(--muted);font-size:13px">Sin datos.</p>'; var max=1; pairs.forEach(function(p){ if(p[1]>max) max=p[1]; }); return pairs.map(function(p){ var w=Math.round(p[1]/max*100); return '<div class="mrow"><div class="mrow__label" title="'+esc(p[0])+'">'+esc(p[0])+'</div><div class="mrow__bar"><div class="mrow__fill" style="width:'+w+'%"></div></div><div class="mrow__val">'+p[1]+'</div></div>'; }).join(''); }
  function viewMetrics(){
    var reqs=state.requests;
    var openItems=reqs.filter(function(r){return isOpen(r.status);});
    var overdue=openItems.filter(function(r){return r.dueDate&&new Date(r.dueDate)<Date.now();});
    var dec=reqs.filter(function(r){return r.decidedAt;});
    var avg=dec.length?dec.reduce(function(s,r){return s+(new Date(r.decidedAt)-new Date(r.createdAt))/86400000;},0)/dec.length:0;
    var withDue=dec.filter(function(r){return r.dueDate;});
    var onTime=withDue.filter(function(r){return new Date(r.decidedAt)<=new Date(r.dueDate);});
    var pct=withDue.length?Math.round(onTime.length/withDue.length*100):null;
    var byPerson=countBy(openItems,function(r){return r.assigneeName||r.assigneeId;}).slice(0,10);
    var byArea=countBy(openItems,function(r){return r.area||'Sin área';});
    var byType=countBy(openItems,function(r){return TYPE[r.type]||r.type;});
    var byStatus=countBy(openItems,function(r){return STATUS[r.status]||r.status;});
    var stats='<div class="stats">'+
      stat('Abiertos',openItems.length)+
      stat('Vencidos',overdue.length,overdue.length?'danger':'')+
      '<div class="stat"><div class="stat__label">Tiempo medio</div><div class="stat__value">'+avg.toFixed(1)+'<span style="font-size:15px;font-weight:600;color:var(--muted)"> d</span></div></div>'+
      '<div class="stat"><div class="stat__label">Cumplimiento fecha</div><div class="stat__value">'+(pct===null?'—':pct+'%')+'</div></div>'+
    '</div>';
    var grid='<div class="mgrid">'+
      '<div class="mcard"><h3>Carga por persona (abiertos)</h3>'+barList(byPerson)+'</div>'+
      '<div class="mcard"><h3>Por área</h3>'+barList(byArea)+'</div>'+
      '<div class="mcard"><h3>Por tipo</h3>'+barList(byType)+'</div>'+
      '<div class="mcard"><h3>Por estado</h3>'+barList(byStatus)+'</div>'+
    '</div>';
    return { title:'Métricas', html:'<div class="phead"><h1>Métricas</h1><p>Panorama del trabajo que puedes ver: carga, áreas, tiempos y cumplimiento.</p></div>'+stats+grid };
  }

  var DRAG={id:null,from:null};
  function colAction(kind,from,to){
    if(from===to) return null;
    if(kind==='task'){
      if(to==='doing'){ if(from==='todo') return 'start'; if(from==='blocked') return 'resume'; }
      if(to==='done' && from==='doing') return 'complete';
      if(to==='blocked' && (from==='todo'||from==='doing')) return 'block';
    } else {
      if(to==='doing'){ if(from==='open') return 'start'; if(from==='blocked') return 'resume'; }
      if(to==='resolved' && from==='doing') return 'resolve';
      if(to==='blocked' && (from==='open'||from==='doing')) return 'block';
    }
    return null;
  }
  function dragStart(e,id){ DRAG.id=id; var r=findReq(id); DRAG.from=r?r.status:null; if(e.dataTransfer){e.dataTransfer.effectAllowed='move';} }
  function dragOver(e,col){ e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect='move'; if(col) col.classList.add('over'); }
  function dragLeave(col){ if(col) col.classList.remove('over'); }
  function drop(e,toStatus,col){ e.preventDefault(); if(col) col.classList.remove('over');
    var id=DRAG.id, from=DRAG.from; DRAG.id=null; DRAG.from=null;
    if(!id) return;
    var action=colAction(BOARD_KINDS[state.boardKind]?state.boardKind:'task', from, toStatus);
    if(!action){ toast('Ese movimiento no está permitido.'); return; }
    act(id, action);
  }

      var A=[];

        if(r.status==='todo') A=[['start','Empezar','btn--primary'],['block','Bloquear','btn--red']];

        else if(r.status==='blocked') A=[['resume','Reanudar','btn--primary']];

        NewForm.type=b.getAttribute('data-type');

        NewForm.syncFields();
      });
      var ti=document.getElementById('f-lbl');
      if(ti){
        ti.addEventListener('keydown',function(e){
          if(e.key==='Enter'||e.key===','){ e.preventDefault(); NewForm.addLabel(ti.value); ti.value=''; }
          else if(e.key==='Backspace'&&!ti.value&&NewForm.labels.length){ NewForm.removeLabel(NewForm.labels.length-1); }
        });
        ti.addEventListener('input',function(){ if(ti.value.indexOf(',')>=0){ ti.value.split(',').forEach(function(p){NewForm.addLabel(p);}); ti.value=''; } });
        ti.addEventListener('blur',function(){ if(ti.value.trim()){ NewForm.addLabel(ti.value); ti.value=''; } });
      }
      document.getElementById('f-submit').addEventListener('click',NewForm.submit);
    },
    addLabel:function(v){ v=String(v||'').trim().slice(0,30); if(!v) return;
      if(NewForm.labels.some(function(x){return x.toLowerCase()===v.toLowerCase();})) return;
      if(NewForm.labels.length>=8) return; NewForm.labels.push(v); NewForm.renderTags(); },
    removeLabel:function(i){ NewForm.labels.splice(i,1); NewForm.renderTags(); },
    renderTags:function(){
      var c=document.getElementById('f-tags'), ti=document.getElementById('f-lbl'); if(!c||!ti) return;
      Array.prototype.slice.call(c.querySelectorAll('.lbl')).forEach(function(n){n.remove();});
      NewForm.labels.forEach(function(l,i){
        var span=document.createElement('span'); span.className='lbl'; span.textContent=l+' ';
        var b=document.createElement('b'); b.textContent='×'; b.onclick=function(){ NewForm.removeLabel(i); };
        span.appendChild(b); c.insertBefore(span, ti);
      });
    },
    syncFields:function(){
      var dec = DECISION_TYPES.indexOf(NewForm.type)>=0;
      var df=document.getElementById('decision-fields'); if(df) df.style.display = dec?'block':'none';
    },
    submit:function(){
      var g=function(id){return document.getElementById(id).value.trim();};
      var body={ type:NewForm.type, title:g('f-title'), assigneeId:document.getElementById('f-to').value, priority:document.getElementById('f-prio').value,
        area:document.getElementById('f-area').value, labels:NewForm.labels.slice(),
        context:g('f-ctx'), recommendation:g('f-rec'), impact:g('f-imp'),
        documentName:g('f-doc'), documentUrl:g('f-url'), documentVersion:g('f-ver'),
        dueDate: document.getElementById('f-due').value ? new Date(document.getElementById('f-due').value).toISOString() : null };
      var err=document.getElementById('f-err');

      if(!body.assigneeId){ err.textContent='Elige a quién le haces la solicitud.'; err.style.display='flex'; return; }
      if(!body.title||!body.context||(dec && (!body.recommendation||!body.impact))){
        err.textContent = dec

      var btn=document.getElementById('f-submit'); btn.disabled=true; btn.textContent='Enviando…';

        return loadRequests().then(function(){ location.hash='#/solicitud/'+encodeURIComponent(d.request.id); });
      }).catch(function(e){ err.textContent=e.message; err.style.display='flex'; btn.disabled=false; btn.textContent='Enviar solicitud'; });

  function openModal(title, sub, cta, cls, requireNote, onConfirm){

      '<textarea class="ta" id="modal-note" placeholder="'+(requireNote?'Escribe el motivo / la pregunta…':'Nota (opcional)…')+'"></textarea>'+

    document.body.appendChild(ov);

    ov.addEventListener('click',function(e){ if(e.target===ov) close(); });
    document.getElementById('modal-cancel').addEventListener('click',close);

  function fiscalDueBadge(due_date, status){
    if(status==='complied') return '<span class="badge b-green bdot">Cumplida</span>';
    var now = new Date(); var d = new Date(due_date+'T12:00:00');
    var diff = Math.floor((d-now)/86400000);
    if(diff<0) return '<span class="badge b-red bdot">Vencida '+Math.abs(diff)+'d</span>';
    if(diff===0) return '<span class="badge b-red bdot">Vence hoy</span>';
    if(diff<=7) return '<span class="badge b-red bdot">'+diff+'d</span>';
    if(diff<=30) return '<span class="badge b-amber bdot">'+diff+'d</span>';
    return '<span class="badge b-slate bdot">'+diff+'d</span>';
  }
  function fiscalTypeBadge(t){
    var m={tax:'b-brand',labor:'b-blue',reporting:'b-slate',compliance:'b-amber'};
    return '<span class="badge '+(m[t]||'b-slate')+'">'+(OB_TYPE_LABEL[t]||t)+'</span>';
  }
  function entityBadges(ids){
    return (ids||[]).map(function(e){ return '<span class="badge b-slate" style="font-size:11px">'+esc(ENTITY_LABEL[e]||e)+'</span>'; }).join(' ');
  }
  function fmtDate(s){ if(!s) return '—'; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  function fmtUsd(v){ if(v==null||v==='') return ''; return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function fiscalDayColor(obs, today){
    var hasOverdue=false, hasUpcoming=false, hasComplied=false;
    obs.forEach(function(o){
      if(o.status==='complied'){ hasComplied=true; return; }
      var d=new Date(o.due_date+'T12:00:00'), diff=Math.floor((d-today)/86400000);
      if(diff<0) hasOverdue=true;
      else if(diff<=30) hasUpcoming=true;
    });
    if(hasOverdue) return 'var(--red)';
    if(hasUpcoming) return 'var(--amber)';
    if(hasComplied) return 'var(--green)';
    return 'var(--brand)';
  }

    html += '<div class="stat" style="cursor:pointer" onclick="CeoDesk.fiscalSetStatus(\'\');CeoDesk.fiscalSetCountry(\'\')"><div class="stat__label">Total obligaciones</div><div class="stat__value">'+totalAll+'</div></div>';
    html += '<div class="stat" style="cursor:pointer" onclick="CeoDesk.fiscalSetStatus(\'overdue\');CeoDesk.fiscalSetView(\'list\')"><div class="stat__label">⚠ Vencidas</div><div class="stat__value danger">'+overdue+'</div></div>';
    html += '<div class="stat" style="cursor:pointer" onclick="CeoDesk.fiscalSetStatus(\'pending\');CeoDesk.fiscalSetView(\'list\')"><div class="stat__label">📆 Próximos 30 días</div><div class="stat__value warn">'+upcoming30+'</div></div>';
    html += '<div class="stat" style="cursor:pointer" onclick="CeoDesk.fiscalSetStatus(\'complied\');CeoDesk.fiscalSetView(\'list\')"><div class="stat__label">✅ Cumplidas 2026</div><div class="stat__value" style="color:var(--green)">'+complied+'</div></div>';
    html += '</div>';

    if(budgetPend>0 || budgetTotal>0){
      html += '<div style="background:var(--amber-soft);border:1px solid color-mix(in srgb,var(--amber) 28%,transparent);border-radius:12px;padding:13px 18px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">';
      html += '<span style="font-size:22px">💰</span>';
      html += '<div><div style="font-weight:700;font-size:13px;color:var(--amber);text-transform:uppercase;letter-spacing:.03em">Presupuesto estimado — obligaciones pendientes</div>';
      html += '<div style="font-weight:800;font-size:22px;color:var(--ink)">'+fmtUsd(budgetPend)+' USD</div></div>';
      if(budgetTotal!==budgetPend) html += '<div style="margin-left:auto;font-size:12px;color:var(--muted)">Total año (incl. cumplidas): <b>'+fmtUsd(budgetTotal)+' USD</b></div>';
      html += '</div>';
    }

    // ── Toolbar: país + estado + vista ────────────────────────────────────
    var country = state.fiscalCountry, status = state.fiscalStatus, view = state.fiscalView||'list';

    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;align-items:center">';
    // País
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
    html += '<button class="chip'+(country===''?' on':'')+'" onclick="CeoDesk.fiscalSetCountry(\'\')">🌎 Todos</button>';
    html += '<button class="chip'+(country==='CO'?' on':'')+'" onclick="CeoDesk.fiscalSetCountry(\'CO\')">🇨🇴 Colombia</button>';
    html += '<button class="chip'+(country==='MX'?' on':'')+'" onclick="CeoDesk.fiscalSetCountry(\'MX\')">🇲🇽 México</button>';
    html += '<button class="chip'+(country==='US'?' on':'')+'" onclick="CeoDesk.fiscalSetCountry(\'US\')">🇺🇸 USA</button>';
    html += '</div>';
    // Vista toggle
    html += '<div style="margin-left:auto;display:flex;border:1px solid var(--border-strong);border-radius:9px;overflow:hidden">';
    html += '<button onclick="CeoDesk.fiscalSetView(\'calendar\')" style="padding:7px 14px;font-size:12.5px;font-weight:700;border:none;cursor:pointer;background:'+(view==='calendar'?'var(--ink)':'var(--surface)')+';color:'+(view==='calendar'?'var(--surface)':'var(--muted)')+'">📅 Calendario</button>';
    html += '<button onclick="CeoDesk.fiscalSetView(\'list\')" style="padding:7px 14px;font-size:12.5px;font-weight:700;border:none;border-left:1px solid var(--border-strong);cursor:pointer;background:'+(view==='list'?'var(--ink)':'var(--surface)')+';color:'+(view==='list'?'var(--surface)':'var(--muted)')+'">☰ Lista</button>';
    html += '</div>';
    html += '</div>';

    // Estado
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px">';
    html += '<button class="chip'+(status===''?' on':'')+'" onclick="CeoDesk.fiscalSetStatus(\'\')">Todos</button>';
    html += '<button class="chip'+(status==='overdue'?' on':'')+'" onclick="CeoDesk.fiscalSetStatus(\'overdue\')" style="'+(status==='overdue'?'':'color:var(--red)')+'">⚠ Vencidas</button>';
    html += '<button class="chip'+(status==='pending'?' on':'')+'" onclick="CeoDesk.fiscalSetStatus(\'pending\')">⏳ Pendientes</button>';
    html += '<button class="chip'+(status==='complied'?' on':'')+'" onclick="CeoDesk.fiscalSetStatus(\'complied\')" style="'+(status==='complied'?'':'color:var(--green)')+'">✅ Cumplidas</button>';
    html += '</div>';

    // ── Filtrar items ─────────────────────────────────────────────────────
    var items = state.fiscal.slice();
    if(country) items = items.filter(function(o){ return o.country===country; });
    if(status==='overdue') items = items.filter(function(o){ return o.status!=='complied' && new Date(o.due_date+'T12:00:00')<today; });
    else if(status==='pending') items = items.filter(function(o){ return o.status!=='complied'; });
    else if(status==='complied') items = items.filter(function(o){ return o.status==='complied'; });

    if(items.length===0){
      html += '<div class="empty"><div class="ic">🎉</div><p>No hay obligaciones con este filtro.</p></div>';
      return { title:'Cumplimiento Fiscal', html:html, after:fiscalAfter };
    }

    // ── VISTA CALENDARIO ──────────────────────────────────────────────────
    if(view==='calendar'){
      // Agrupar items por mes (YYYY-MM)
      var byMonth = {};
      items.forEach(function(o){
        var mk = o.due_date ? o.due_date.slice(0,7) : '0000-00';
        if(!byMonth[mk]) byMonth[mk]=[];
        byMonth[mk].push(o);
      });
      var monthKeys = Object.keys(byMonth).sort();

      // Mes seleccionado para detalle
      var selMonth = state.fiscalCalMonth || monthKeys[0];
      if(!byMonth[selMonth]) selMonth = monthKeys[0];

      // Mini-calendar tabs (un tab por mes con obligaciones)
      html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">';
      monthKeys.forEach(function(mk){
        var p=mk.split('-'), mName=MONTH_SHORT[+p[1]-1]+' '+p[0];
        var cnt = byMonth[mk].length;
        var hasOv = byMonth[mk].some(function(o){ return o.status!=='complied' && new Date(o.due_date+'T12:00:00')<today; });
        var isActive = mk===selMonth;
        html += '<button onclick="CeoDesk.fiscalSetCalMonth(\''+mk+'\')" style="padding:7px 13px;border-radius:9px;font-size:13px;font-weight:700;border:1.5px solid '+(isActive?'var(--ink)':'var(--border-strong)')+';background:'+(isActive?'var(--ink)':'var(--surface)')+';color:'+(isActive?'var(--surface)':hasOv?'var(--red)':'var(--ink)')+';">'+mName+' <span style="opacity:.7;font-size:11px">('+cnt+')</span></button>';
      });
      html += '</div>';

      // Calendario visual del mes seleccionado
      var cp = selMonth.split('-'), cy = +cp[0], cm = +cp[1]-1;
      var firstDay = new Date(cy, cm, 1).getDay(); // 0=Dom
      var daysInMonth = new Date(cy, cm+1, 0).getDate();

      // Mapa día -> obligaciones de ese mes
      var dayMap = {};
      (byMonth[selMonth]||[]).forEach(function(o){
        if(!o.due_date) return;
        var d = +o.due_date.split('-')[2];
        if(!dayMap[d]) dayMap[d]=[];
        dayMap[d].push(o);
      });

      html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px">';
      html += '<div style="font-weight:800;font-size:17px;margin-bottom:14px;text-align:center">'+MONTH_NAMES[cm]+' '+cy+'</div>';

      // Grid header
      var dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">';
      dayNames.forEach(function(d){ html += '<div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px">'+d+'</div>'; });
      html += '</div>';

      // Day cells
      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
      // Empty cells before first day
      for(var i=0;i<firstDay;i++) html += '<div></div>';
      for(var d=1;d<=daysInMonth;d++){
        var dateStr = cp[0]+'-'+(cm+1<10?'0':'')+(cm+1)+'-'+(d<10?'0':'')+d;
        var dayObs = dayMap[d]||[];
        var isToday = today.getFullYear()===cy && today.getMonth()===cm && today.getDate()===d;
        var dotColor = dayObs.length>0 ? fiscalDayColor(dayObs, today) : '';
        var cellBg = isToday ? 'var(--brand-soft)' : (dayObs.length>0 ? 'var(--surface-2)' : 'transparent');
        var cellBorder = isToday ? '2px solid var(--brand)' : (dayObs.length>0 ? '1px solid var(--border-strong)' : '1px solid transparent');
        html += '<div style="border-radius:8px;padding:6px 4px;text-align:center;background:'+cellBg+';border:'+cellBorder+';min-height:52px;cursor:'+(dayObs.length?'pointer':'default')+';" '+(dayObs.length?'onclick="document.getElementById(\'fsec-'+dateStr+'\').scrollIntoView({behavior:\'smooth\',block:\'start\'})"':'')+' title="'+(dayObs.length?dayObs.length+' obligacion'+(dayObs.length>1?'es':''):'')+'">';
        html += '<div style="font-size:12px;font-weight:'+(isToday?'800':'600')+';color:'+(isToday?'var(--brand)':'var(--ink)')+'">'+d+'</div>';
        if(dayObs.length>0){
          html += '<div style="display:flex;flex-direction:column;gap:2px;margin-top:3px">';
          dayObs.slice(0,3).forEach(function(o){
            var c = o.status==='complied' ? 'var(--green)' : (new Date(o.due_date+'T12:00:00')<today ? 'var(--red)' : (Math.floor((new Date(o.due_date+'T12:00:00')-today)/86400000)<=30 ? 'var(--amber)' : 'var(--brand)'));
            html += '<div style="height:4px;border-radius:2px;background:'+c+'"></div>';
          });
          if(dayObs.length>3) html += '<div style="font-size:9px;color:var(--muted);font-weight:700">+' + (dayObs.length-3)+'</div>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div></div>'; // grid + calendar card

      // Leyenda
      html += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;font-size:12px;color:var(--muted)">';
      html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin-right:4px"></span>Vencida</span>';
      html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--amber);margin-right:4px"></span>Próxima (&lt;30d)</span>';
      html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--brand);margin-right:4px"></span>Pendiente</span>';
      html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-right:4px"></span>Cumplida</span>';
      html += '</div>';

      // Detalle de cada día con obligaciones (en orden)
      var sortedDays = Object.keys(dayMap).map(Number).sort(function(a,b){return a-b;});
      sortedDays.forEach(function(d){
        var dateStr = cp[0]+'-'+(cm+1<10?'0':'')+(cm+1)+'-'+(d<10?'0':'')+d;
        html += '<div id="fsec-'+dateStr+'" style="scroll-margin-top:70px">';
        html += '<div class="rowlbl">'+d+' de '+MONTH_NAMES[cm]+'</div>';
        html += '<div class="rows" style="margin-bottom:14px">';
        dayMap[d].forEach(function(o){ html += fiscalObRow(o, today); });
        html += '</div></div>';
      });

    // ── VISTA LISTA ───────────────────────────────────────────────────────
    } else {
      var groups = {};
      items.forEach(function(o){
        var key = o.due_date ? o.due_date.slice(0,7) : '—';
        if(!groups[key]) groups[key]=[];
        groups[key].push(o);
      });
      var keys = Object.keys(groups).sort();

      keys.forEach(function(k){
        var parts = k.split('-');
        var mLabel = k==='—' ? '—' : MONTH_NAMES[+parts[1]-1]+' '+parts[0];
        html += '<div id="fsec-'+k+'" class="rowlbl" style="scroll-margin-top:70px">'+mLabel+'</div>';
        html += '<div class="rows" style="margin-bottom:20px">';
        groups[k].forEach(function(o){ html += fiscalObRow(o, today); });
        html += '</div>';
      });
    }

    return { title:'Cumplimiento Fiscal', html:html, after:fiscalAfter };
  }

  function fiscalAfter(){
    var id = state.fiscalEditId;
    if(id){ var el=document.getElementById('fbudget-'+id); if(el){ el.focus(); el.select(); } }
  }

  function fiscalSetCountry(c){ state.fiscalCountry=c; render(); }
  function fiscalSetStatus(s){ state.fiscalStatus=s; render(); }
  function fiscalSetView(v){ state.fiscalView=v; render(); }
  function fiscalSetCalMonth(m){ state.fiscalCalMonth=m; render(); }
  function fiscalEdit(id){ state.fiscalEditId=id; render(); }
  function fiscalCancelEdit(){ state.fiscalEditId=null; render(); }

  function fiscalComply(id){
    if(!confirm('¿Marcar como cumplida?')) return;
    var now = new Date().toISOString().slice(0,10);
    api('/fiscal',{method:'PUT',body:{id:id, status:'complied', compliance_date:now}})
      .then(function(){ return loadFiscal(); }).then(function(){ render(); })
      .catch(function(e){ alert(e.message); });
  }

  function fiscalUndo(id){
    if(!confirm('¿Revertir a estado pendiente?')) return;
    api('/fiscal',{method:'PUT',body:{id:id, status:'pending', compliance_date:null}})
      .then(function(){ return loadFiscal(); }).then(function(){ render(); })
      .catch(function(e){ alert(e.message); });
  }

  function fiscalSaveBudget(id){
    var el = document.getElementById('fbudget-'+id);
    var val = el ? el.value.trim() : '';
    var num = val==='' ? null : Number(val);
    if(val!=='' && isNaN(num)){ alert('Ingresa un número válido'); return; }
    api('/fiscal',{method:'PUT',body:{id:id, estimated_amount_usd:num}})
      .then(function(){ return loadFiscal(); })
      .then(function(){ state.fiscalEditId=null; render(); })
      .catch(function(e){ alert(e.message); });
  }

  function fiscalSeed(){
    if(!confirm('¿Cargar / recargar el catálogo de obligaciones 2026?\n\n~107 obligaciones para Colombia, México y USA. No duplica lo ya existente.')) return;
    state.fiscalBusy=true;
    api('/fiscal?reseed=1')
      .then(function(d){ state.fiscal=d.obligations||[]; state.fiscalLoaded=true; state.fiscalBusy=false; render(); })
      .catch(function(e){ state.fiscalBusy=false; alert(e.message||'Error al cargar'); });
  }

  // expose
  window.CeoDesk = { logout:logout, setFilter:function(f){state.listFilter=f;render();}, setHist:function(f){state.histFilter=f;render();},
    boardScope:function(v){state.boardScope=v;render();}, boardArea:function(v){state.boardArea=v;render();}, boardKind:function(v){state.boardKind=v;render();}, boardLabel:function(v){state.boardLabel=v;render();},
    saveView:function(){ var n=prompt('Nombre de la vista:'); if(!n||!n.trim()) return; var v=loadViews(); v.push({name:n.trim().slice(0,30),kind:state.boardKind,scope:state.boardScope,area:state.boardArea,label:state.boardLabel}); saveViews(v); render(); },
    applyView:function(i){ var v=loadViews()[i]; if(!v) return; state.boardKind=v.kind||'task'; state.boardScope=v.scope||''; state.boardArea=v.area||''; state.boardLabel=v.label||''; render(); },
    delView:function(i){ var v=loadViews(); v.splice(i,1); saveViews(v); render(); },
    dragStart:dragStart, dragOver:dragOver, dragLeave:dragLeave, drop:drop,
    act:act, respond:respond, comment:comment, toggleMenu:toggleMenu, closeMenu:closeMenu,
    gtCreate:gtCreate, gtAct:gtAct, gtConnect:gtConnect, gtDisconnect:gtDisconnect,
    jiraConnect:jiraConnect, jiraDisconnect:jiraDisconnect,
    fiscalSetCountry:fiscalSetCountry, fiscalSetStatus:fiscalSetStatus, fiscalSetView:fiscalSetView, fiscalSetCalMonth:fiscalSetCalMonth, fiscalEdit:fiscalEdit, fiscalCancelEdit:fiscalCancelEdit, fiscalComply:fiscalComply, fiscalUndo:fiscalUndo, fiscalSaveBudget:fiscalSaveBudget, fiscalSeed:fiscalSeed };

  window.addEventListener('hashchange', function(){ if(state.user) render(); });
  boot();
})();
</script>
</body>
</html>
