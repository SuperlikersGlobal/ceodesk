[build]
  publish = "public"
  command = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# API amigable: /api/* -> funciones serverless
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA: cualquier otra ruta sirve el index (router por hash en el cliente).
# Va al final para que /api se evalúe primero.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
